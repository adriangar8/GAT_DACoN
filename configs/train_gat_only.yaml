
name: dacon_train_gat_only
model_type: DACoN

num_gpu: 1
manual_seed: 42

version: "1_1"
colorize_type: keyframe

datasets:
  name: PaintBucket_Char_v2
  clip_interval: 20

  train:
    root: dataset/PaintBucket_Char_v2/train/PaintBucket_Char_v2/
    seg_size: [512, 512]
    use_shuffle: True
    num_worker: 4

  val:
    root: dataset/PaintBucket_Char_v2/test/PaintBucket_Char_v2/
    save_path: outputs/gat_only/
    num_worker: 4


network:
  feats_dim: 128

  dino_model_type: dinov2_vitl14
  dino_input_size: [518, 518]

  unet_input_size: [512, 512]
  unet_input_dim: 3
  unet_hidden_dim_list: [64, 128, 256, 512]

  segment_pool_size: [512, 512]

  use_gat: True
  gat_dropout: 0.1

train:
  scheduler:
    type: Adam
    learning_rate: 1e-4

  num_epochs: 5
  batch_size: 2

  model_save_path: checkpoints/gat_only/

  use_aug: False   # ablation: GAT only, no sketch augmentation

val:
  save_images: True
  save_json: True
  save_path: outputs/gat_only/

  batch_size: 1

losses:
  loss_scale_ce: 0.5
  loss_scale_mae: 0.2


name: dacon_test_aug_only
model_type: DACoN

num_gpu: 1
manual_seed: 42

version: "1_1"
colorize_type: keyframe
ref_shot: 1

datasets:
  name: PaintBucket_Char_v2
  clip_interval: 20

  val:
    root: dataset/PaintBucket_Char_v2/test/PaintBucket_Char_v2/
    num_worker: 4

network:
  feats_dim: 128

  dino_model_type: dinov2_vitl14
  dino_input_size: [518, 518]

  unet_input_size: [512, 512]
  unet_input_dim: 3
  unet_hidden_dim_list: [64, 128, 256, 512]

  segment_pool_size: [512, 512]

  use_gat: False   # must match the trained model (aug-only has no GAT)

val:
  save_images: True
  save_json: True
  save_path: outputs/aug_only/
  batch_size: 1

losses:
  loss_scale_ce: 0.5
  loss_scale_mae: 0.2
